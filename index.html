<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FitCheck.exe</title>
  <style>
    :root {
      --green: #00ff41;
      --green-dim: #00aa2b;
      --red: #ff3333;
      --yellow: #ffdd00;
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #1e1e1e;
      --text: #e0e0e0;
      --muted: #555;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Courier New', Courier, monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 64px;
    }

    /* ── Header ── */
    header {
      text-align: center;
      margin-bottom: 40px;
    }

    .title {
      font-size: clamp(2rem, 8vw, 4rem);
      font-weight: 900;
      color: var(--green);
      letter-spacing: -1px;
      text-shadow: 0 0 20px var(--green-dim);
      animation: flicker 6s infinite;
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.8rem;
      margin-top: 4px;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    @keyframes flicker {
      0%, 95%, 100% { opacity: 1; }
      96% { opacity: 0.7; }
      97% { opacity: 1; }
      98% { opacity: 0.4; }
      99% { opacity: 1; }
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 24px;
      width: 100%;
      max-width: 560px;
    }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      gap: 0;
      margin-bottom: 20px;
      border: 1px solid var(--border);
    }

    .tab {
      flex: 1;
      background: none;
      border: none;
      color: var(--muted);
      font-family: inherit;
      font-size: 0.85rem;
      padding: 10px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 2px;
      transition: all 0.15s;
    }

    .tab:first-child { border-right: 1px solid var(--border); }

    .tab.active {
      color: var(--green);
      background: rgba(0, 255, 65, 0.05);
    }

    .tab:hover:not(.active) { color: var(--text); }

    /* ── Upload area ── */
    .upload-area {
      border: 1px dashed var(--border);
      padding: 32px 16px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.15s;
      position: relative;
    }

    .upload-area:hover, .upload-area.drag-over {
      border-color: var(--green-dim);
    }

    .upload-area input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    .upload-icon { font-size: 2rem; margin-bottom: 8px; }

    .upload-label {
      font-size: 0.85rem;
      color: var(--muted);
    }

    .upload-label span { color: var(--green); }

    /* ── Preview ── */
    #preview-wrap {
      display: none;
      margin-top: 16px;
      position: relative;
    }

    #preview-wrap img {
      width: 100%;
      max-height: 320px;
      object-fit: contain;
      border: 1px solid var(--border);
    }

    .clear-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      background: rgba(0,0,0,0.7);
      border: 1px solid var(--muted);
      color: var(--text);
      font-family: inherit;
      font-size: 0.75rem;
      padding: 4px 8px;
      cursor: pointer;
    }

    .clear-btn:hover { border-color: var(--red); color: var(--red); }

    /* ── Camera ── */
    #camera-panel { display: none; }

    .camera-wrap {
      position: relative;
      background: #000;
      border: 1px solid var(--border);
    }

    #video {
      width: 100%;
      max-height: 320px;
      display: block;
      object-fit: cover;
      transform: scaleX(-1);
    }

    #canvas { display: none; }

    .camera-controls {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    .camera-denied {
      color: var(--muted);
      font-size: 0.8rem;
      padding: 16px;
      text-align: center;
      border: 1px dashed var(--border);
    }

    /* ── Buttons ── */
    .btn {
      font-family: inherit;
      font-size: 0.85rem;
      padding: 10px 20px;
      border: 1px solid;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 2px;
      transition: all 0.15s;
    }

    .btn-primary {
      background: var(--green);
      border-color: var(--green);
      color: #000;
      font-weight: 900;
      width: 100%;
      padding: 14px;
      margin-top: 20px;
      font-size: 1rem;
    }

    .btn-primary:hover:not(:disabled) {
      background: #00cc33;
      box-shadow: 0 0 20px rgba(0,255,65,0.3);
    }

    .btn-primary:disabled {
      background: var(--muted);
      border-color: var(--muted);
      cursor: not-allowed;
    }

    .btn-secondary {
      background: none;
      border-color: var(--border);
      color: var(--text);
      font-size: 0.8rem;
    }

    .btn-secondary:hover { border-color: var(--text); }

    .btn-capture {
      background: none;
      border-color: var(--green);
      color: var(--green);
    }

    .btn-capture:hover { background: rgba(0,255,65,0.1); }

    /* ── Error ── */
    #error-msg {
      display: none;
      color: var(--red);
      font-size: 0.8rem;
      margin-top: 12px;
      padding: 8px;
      border: 1px solid var(--red);
      background: rgba(255,51,51,0.05);
    }

    /* ── Loading overlay ── */
    #loading {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 100;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
    }

    #loading.active { display: flex; }

    .spinner {
      width: 48px;
      height: 48px;
      border: 3px solid var(--border);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-msg {
      color: var(--green);
      font-size: 0.9rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-align: center;
      max-width: 300px;
    }

    /* ── Results ── */
    #results {
      display: none;
      width: 100%;
      max-width: 560px;
      margin-top: 32px;
    }

    #results.active { display: block; }

    /* Score hero */
    .score-hero {
      text-align: center;
      padding: 32px 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      margin-bottom: 16px;
      position: relative;
      overflow: hidden;
    }

    .score-hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, rgba(0,255,65,0.06) 0%, transparent 70%);
    }

    .score-number {
      font-size: clamp(4rem, 20vw, 7rem);
      font-weight: 900;
      color: var(--green);
      line-height: 1;
      text-shadow: 0 0 40px var(--green-dim);
    }

    .score-denom {
      font-size: 1.5rem;
      color: var(--muted);
    }

    .verdict-badge {
      display: inline-block;
      background: var(--green);
      color: #000;
      font-weight: 900;
      font-size: 1rem;
      padding: 6px 16px;
      letter-spacing: 3px;
      margin: 16px 0 8px;
    }

    .verdict-sub {
      color: var(--text);
      font-size: 0.9rem;
      max-width: 400px;
      margin: 0 auto;
    }

    .result-emoji {
      font-size: 3rem;
      margin-bottom: 8px;
    }

    /* Categories */
    .section {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 20px;
      margin-bottom: 12px;
    }

    .section-title {
      color: var(--green);
      font-size: 0.7rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 16px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 8px;
    }

    .category-row {
      margin-bottom: 14px;
    }

    .category-row:last-child { margin-bottom: 0; }

    .category-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 6px;
    }

    .category-name {
      font-size: 0.8rem;
      color: var(--text);
    }

    .category-score {
      font-size: 0.85rem;
      color: var(--green);
      font-weight: 700;
    }

    .bar-track {
      height: 4px;
      background: var(--border);
      position: relative;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      background: var(--green);
      width: 0%;
      transition: width 1s cubic-bezier(0.25, 1, 0.5, 1);
    }

    .category-comment {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 4px;
    }

    /* Roast */
    .roast-text {
      font-size: 0.88rem;
      line-height: 1.7;
      color: var(--text);
    }

    /* Tips */
    .tips-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .tips-list li {
      font-size: 0.85rem;
      color: var(--text);
      padding-left: 20px;
      position: relative;
      line-height: 1.5;
    }

    .tips-list li::before {
      content: '▸';
      position: absolute;
      left: 0;
      color: var(--green);
    }

    /* Reset */
    .reset-btn {
      width: 100%;
      margin-top: 20px;
      font-size: 0.85rem;
      padding: 12px;
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: inherit;
      cursor: pointer;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: all 0.15s;
    }

    .reset-btn:hover { border-color: var(--text); color: var(--text); }

    /* Scanline effect */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.03) 2px,
        rgba(0,0,0,0.03) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }
  </style>
</head>
<body>

  <header>
    <div class="title">FitCheck.exe</div>
    <div class="subtitle">AI-Powered Drip Analysis</div>
  </header>

  <div class="card" id="input-card">
    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" id="tab-upload" onclick="switchTab('upload')">⬆ Upload</button>
      <button class="tab" id="tab-camera" onclick="switchTab('camera')">📷 Camera</button>
    </div>

    <!-- Upload panel -->
    <div id="upload-panel">
      <div class="upload-area" id="drop-zone">
        <input type="file" id="file-input" accept="image/*" />
        <div class="upload-icon">🖼</div>
        <div class="upload-label">Drop your fit here or <span>click to browse</span></div>
        <div class="upload-label" style="margin-top:6px; font-size:0.75rem;">JPEG · PNG · WEBP · GIF · max 5MB</div>
      </div>
      <div id="preview-wrap">
        <img id="preview-img" src="" alt="preview" />
        <button class="clear-btn" onclick="clearImage()">✕ Clear</button>
      </div>
    </div>

    <!-- Camera panel -->
    <div id="camera-panel">
      <div class="camera-wrap">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvas"></canvas>
      </div>
      <div id="camera-denied" class="camera-denied" style="display:none">
        Camera access denied. Use the Upload tab instead.
      </div>
      <div class="camera-controls" id="camera-controls">
        <button class="btn btn-capture" onclick="capturePhoto()">📸 Capture</button>
        <button class="btn btn-secondary" onclick="retakePhoto()" id="retake-btn" style="display:none">↩ Retake</button>
      </div>
      <div id="camera-preview-wrap" style="display:none; margin-top:12px;">
        <img id="camera-preview-img" src="" alt="captured" style="width:100%; border:1px solid var(--border);" />
      </div>
    </div>

    <div id="error-msg"></div>

    <button class="btn btn-primary" id="submit-btn" disabled onclick="submitFit()">
      CHECK MY FIT
    </button>
  </div>

  <!-- Loading overlay -->
  <div id="loading">
    <div class="spinner"></div>
    <div class="loading-msg" id="loading-msg">Booting up drip scanner...</div>
  </div>

  <!-- Results -->
  <div id="results">
    <div class="score-hero">
      <div class="result-emoji" id="res-emoji"></div>
      <div>
        <span class="score-number" id="res-score">0</span><span class="score-denom">/10</span>
      </div>
      <div class="verdict-badge" id="res-verdict"></div>
      <div class="verdict-sub" id="res-verdict-sub"></div>
    </div>

    <div class="section">
      <div class="section-title">Category Breakdown</div>
      <div id="categories-list"></div>
    </div>

    <div class="section">
      <div class="section-title">The Roast 🔥</div>
      <div class="roast-text" id="res-roast"></div>
    </div>

    <div class="section">
      <div class="section-title">Glow-Up Tips ✨</div>
      <ul class="tips-list" id="res-tips"></ul>
    </div>

    <button class="reset-btn" onclick="resetApp()">⟳ Check Another Fit</button>
  </div>

  <script>
    // ── State ──────────────────────────────────────────────────────────────
    let currentImage = null; // { base64, mediaType }
    let stream = null;
    let cameraActive = false;
    let cameraCaptured = false;

    const LOADING_MESSAGES = [
      "Consulting the drip council...",
      "Measuring rizz levels...",
      "Calculating your L...",
      "Cross-referencing with vogue archives...",
      "Scanning for fit violations...",
      "Deploying fashion AI...",
      "Analyzing the sauce...",
      "Checking if it's giving...",
      "Rating the swag index...",
      "Summoning the fashion gods...",
    ];

    // ── Tab switching ───────────────────────────────────────────────────────
    function switchTab(tab) {
      document.getElementById('tab-upload').classList.toggle('active', tab === 'upload');
      document.getElementById('tab-camera').classList.toggle('active', tab === 'camera');
      document.getElementById('upload-panel').style.display = tab === 'upload' ? 'block' : 'none';
      document.getElementById('camera-panel').style.display = tab === 'camera' ? 'block' : 'none';

      if (tab === 'camera' && !cameraActive && !cameraCaptured) {
        startCamera();
      } else if (tab === 'upload') {
        // Don't kill stream — user might switch back
      }

      clearError();
      updateSubmitBtn();
    }

    // ── Camera ─────────────────────────────────────────────────────────────
    async function startCamera() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } }
        });
        const video = document.getElementById('video');
        video.srcObject = stream;
        cameraActive = true;
      } catch (e) {
        document.getElementById('video').style.display = 'none';
        document.getElementById('camera-controls').style.display = 'none';
        document.getElementById('camera-denied').style.display = 'block';
      }
    }

    function capturePhoto() {
      const video = document.getElementById('video');
      const canvas = document.getElementById('canvas');
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      const ctx = canvas.getContext('2d');
      // Mirror to match display
      ctx.translate(canvas.width, 0);
      ctx.scale(-1, 1);
      ctx.drawImage(video, 0, 0);

      const dataUrl = canvas.toDataURL('image/jpeg', 0.92);
      const base64 = dataUrl.split(',')[1];

      currentImage = { base64, mediaType: 'image/jpeg' };
      cameraCaptured = true;

      document.getElementById('camera-preview-img').src = dataUrl;
      document.getElementById('camera-preview-wrap').style.display = 'block';
      document.getElementById('video').style.display = 'none';
      document.getElementById('retake-btn').style.display = 'inline-block';

      updateSubmitBtn();
    }

    function retakePhoto() {
      currentImage = null;
      cameraCaptured = false;
      document.getElementById('camera-preview-wrap').style.display = 'none';
      document.getElementById('video').style.display = 'block';
      document.getElementById('retake-btn').style.display = 'none';
      updateSubmitBtn();
    }

    // ── File upload ─────────────────────────────────────────────────────────
    const fileInput = document.getElementById('file-input');
    const dropZone = document.getElementById('drop-zone');

    fileInput.addEventListener('change', (e) => handleFile(e.target.files[0]));

    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('drag-over');
    });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      handleFile(e.dataTransfer.files[0]);
    });

    function handleFile(file) {
      if (!file) return;
      const allowed = ['image/jpeg', 'image/png', 'image/webp', 'image/gif'];
      if (!allowed.includes(file.type)) {
        showError('Invalid file type. Please upload a JPEG, PNG, WEBP, or GIF.');
        return;
      }
      if (file.size > 5 * 1024 * 1024) {
        showError('File is too large. Max size is 5MB.');
        return;
      }
      clearError();

      const reader = new FileReader();
      reader.onload = (e) => {
        const dataUrl = e.target.result;
        const base64 = dataUrl.split(',')[1];
        currentImage = { base64, mediaType: file.type };

        document.getElementById('preview-img').src = dataUrl;
        document.getElementById('preview-wrap').style.display = 'block';
        updateSubmitBtn();
      };
      reader.readAsDataURL(file);
    }

    function clearImage() {
      currentImage = null;
      fileInput.value = '';
      document.getElementById('preview-img').src = '';
      document.getElementById('preview-wrap').style.display = 'none';
      updateSubmitBtn();
    }

    // ── Submit ──────────────────────────────────────────────────────────────
    function updateSubmitBtn() {
      document.getElementById('submit-btn').disabled = !currentImage;
    }

    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = `⚠ ${msg}`;
      el.style.display = 'block';
    }

    function clearError() {
      const el = document.getElementById('error-msg');
      el.textContent = '';
      el.style.display = 'none';
    }

    async function submitFit() {
      if (!currentImage) return;
      clearError();

      // Show loading
      const loadingEl = document.getElementById('loading');
      const loadingMsg = document.getElementById('loading-msg');
      loadingEl.classList.add('active');

      // Rotate loading messages
      let msgIdx = 0;
      loadingMsg.textContent = LOADING_MESSAGES[0];
      const msgInterval = setInterval(() => {
        msgIdx = (msgIdx + 1) % LOADING_MESSAGES.length;
        loadingMsg.textContent = LOADING_MESSAGES[msgIdx];
      }, 1800);

      try {
        const res = await fetch('/api/check', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ image: currentImage.base64, mediaType: currentImage.mediaType }),
        });

        clearInterval(msgInterval);
        loadingEl.classList.remove('active');

        const data = await res.json();

        if (!res.ok) {
          if (res.status === 429) {
            showError(data.message || 'Daily limit reached. Come back tomorrow.');
          } else {
            showError(data.error || 'Something went wrong. Try again.');
          }
          return;
        }

        if (data.error === 'no_outfit') {
          showError("Couldn't detect an outfit in that image. Try a clearer photo showing your full fit.");
          return;
        }

        renderResults(data);
      } catch (e) {
        clearInterval(msgInterval);
        loadingEl.classList.remove('active');
        showError('Network error. Check your connection and try again.');
      }
    }

    // ── Render results ──────────────────────────────────────────────────────
    function renderResults(data) {
      // Scroll to top first
      window.scrollTo({ top: 0, behavior: 'smooth' });

      document.getElementById('input-card').style.display = 'none';

      const resultsEl = document.getElementById('results');
      resultsEl.classList.add('active');

      // Emoji
      document.getElementById('res-emoji').textContent = data.emoji || '🎯';

      // Animated score
      const scoreEl = document.getElementById('res-score');
      const target = parseFloat(data.score) || 0;
      animateScore(scoreEl, 0, target, 1200);

      // Score colour
      const hue = Math.round((target / 10) * 120);
      scoreEl.style.color = `hsl(${hue}, 100%, 55%)`;

      // Verdict
      document.getElementById('res-verdict').textContent = data.verdict || '';
      document.getElementById('res-verdict-sub').textContent = data.verdictSub || '';

      // Categories
      const catList = document.getElementById('categories-list');
      catList.innerHTML = '';
      (data.categories || []).forEach((cat, i) => {
        const row = document.createElement('div');
        row.className = 'category-row';
        row.innerHTML = `
          <div class="category-header">
            <span class="category-name">${escHtml(cat.name)}</span>
            <span class="category-score">${cat.score}/10</span>
          </div>
          <div class="bar-track"><div class="bar-fill" id="bar-${i}"></div></div>
          <div class="category-comment">${escHtml(cat.comment)}</div>
        `;
        catList.appendChild(row);
        // Animate bars with stagger
        setTimeout(() => {
          document.getElementById(`bar-${i}`).style.width = `${(cat.score / 10) * 100}%`;
        }, 200 + i * 100);
      });

      // Roast
      document.getElementById('res-roast').textContent = data.roast || '';

      // Tips
      const tipsList = document.getElementById('res-tips');
      tipsList.innerHTML = '';
      (data.tips || []).forEach(tip => {
        const li = document.createElement('li');
        li.textContent = tip;
        tipsList.appendChild(li);
      });
    }

    function animateScore(el, from, to, duration) {
      const start = performance.now();
      function step(now) {
        const progress = Math.min((now - start) / duration, 1);
        const eased = 1 - Math.pow(1 - progress, 4);
        const current = from + (to - from) * eased;
        el.textContent = current.toFixed(1);
        if (progress < 1) requestAnimationFrame(step);
        else el.textContent = to.toFixed(1);
      }
      requestAnimationFrame(step);
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // ── Reset ───────────────────────────────────────────────────────────────
    function resetApp() {
      currentImage = null;
      cameraCaptured = false;

      fileInput.value = '';
      document.getElementById('preview-img').src = '';
      document.getElementById('preview-wrap').style.display = 'none';

      document.getElementById('camera-preview-wrap').style.display = 'none';
      document.getElementById('video').style.display = 'block';
      document.getElementById('retake-btn').style.display = 'none';

      document.getElementById('results').classList.remove('active');
      document.getElementById('input-card').style.display = 'block';

      clearError();
      updateSubmitBtn();

      // Restart camera if on camera tab
      if (document.getElementById('tab-camera').classList.contains('active')) {
        if (stream) {
          stream.getTracks().forEach(t => t.stop());
          stream = null;
        }
        cameraActive = false;
        startCamera();
      }

      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // ── Init ────────────────────────────────────────────────────────────────
    // Upload tab active by default — camera starts only on switch
    document.getElementById('camera-panel').style.display = 'none';
  </script>
</body>
</html>
